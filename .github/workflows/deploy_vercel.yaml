name: Deploy to Vercel (main)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

concurrency:
  group: vercel-develop
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./believers-hostel-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: believers-hostel-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment (Preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN_DEV }}

      - name: Deploy to Vercel (Preview)
        uses: BetaHuhn/deploy-to-vercel-action@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_DEV }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          WORKING_DIRECTORY: ./believers-hostel-frontend